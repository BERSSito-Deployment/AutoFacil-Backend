services:
  postgres:
    image: postgres:16-alpine
    container_name: autofacil_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autofacil}
      POSTGRES_USER: ${POSTGRES_USER:-autofacil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autofacil_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autofacil} -d ${POSTGRES_DB:-autofacil}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
